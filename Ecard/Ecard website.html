<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HKMU Alumni Homecoming Dinner 2026</title>

<style>
body {
    margin: 0;
    background: #0f2f44;
    font-family: 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    color: white;
}

.logo {
    width: 120px;
    margin-bottom: 20px;
}

.card {
    width: 400px;
    height: 600px;
    background: black;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.info {
    margin-top: 25px;
    text-align: center;
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

p {
    margin: 5px 0;
    font-size: 14px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="card">
    <video autoplay muted loop playsinline>
        <source src="ecard.mp4" type="video/mp4">
    </video>
</div>

<div class="info">
    <h1>HKMU Alumni Homecoming Dinner 2026</h1>
</div>

</body>
</html>
